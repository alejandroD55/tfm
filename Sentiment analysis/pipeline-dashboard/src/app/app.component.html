<div class="aurora-shell">

  <!-- ─── Sidebar (columna izquierda, alto completo) ─── -->
  <aside class="aurora-sidebar">
    <app-sidebar></app-sidebar>
  </aside>

  <!-- ─── Columna principal ─── -->
  <div class="aurora-main">

    <!-- Topbar: fila fija, no necesita sticky porque su padre tiene overflow:hidden -->
    <header class="aurora-topbar">

      <div class="topbar-left">
        <div class="brand-mini" matTooltip="Aurora · TFM Trading System">
          <div class="brand-dot"></div>
          <span class="brand-name">Aurora</span>
          <span class="brand-tag">Trading System (TFM)</span>
        </div>
      </div>

      <div class="topbar-center">
        <div class="market-pill" matTooltip="Modelo Bayesiano activo en producción">
          <span class="market-led on"></span>
          <span>Modelo Activo</span>
          <span class="market-sep">·</span>
          <span class="market-now">{{ now | date:'EEE d MMM · HH:mm' }}</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="user-chip" matTooltip="Desarrolladores del Proyecto">
          <div class="user-avatar">A&amp;A</div>
          <div class="user-meta">
            <span class="user-name">A. Ramos y A. Padrón</span>
            <span class="user-role">MLOps &amp; Quant Engineers</span>
          </div>
        </div>
      </div>

    </header>

    <!-- Área de contenido: único punto de scroll en toda la app -->
    <main class="aurora-content">
      <router-outlet />
    </main>

  </div>

</div>
