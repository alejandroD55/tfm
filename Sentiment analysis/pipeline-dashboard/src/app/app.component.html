<div class="aurora-shell">

  <aside class="aurora-sidebar">
    <app-sidebar></app-sidebar>
  </aside>

  <div class="aurora-main">

    <header class="aurora-topbar">
      <div class="topbar-left">
        <div class="brand-mini">
          <div class="brand-dot"></div>
          <span class="brand-name">Aurora</span>
          <span class="brand-tag">Trading System (TFM)</span>
        </div>
      </div>

      <div class="topbar-center">
        <div class="market-pill" matTooltip="Ejecutando Modelo Bayesiano">
          <span class="market-led on"></span>
          <span>Modelo Activo</span>
          <span class="market-sep">·</span>
          <span class="market-now">{{ now | date:'EEE d MMM · HH:mm' }}</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="user-chip" matTooltip="Desarrolladores del Proyecto">
          <div class="user-avatar">A&A</div>
          <div class="user-meta">
            <span class="user-name">A. Ramos y A. Padrón</span>
            <span class="user-role">MLOps & Quant Engineers</span>
          </div>
        </div>
      </div>
    </header>

    <main class="aurora-content">
      <router-outlet />
    </main>

  </div>
</div>
