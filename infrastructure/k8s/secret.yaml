# ─── secret.yaml — TEMPLATE (no subir al repo con valores reales) ─────────────
# Este archivo es una plantilla. El script deploy_k8s.sh lo genera con los
# valores reales en tiempo de ejecución usando 'kubectl create secret'.
#
# Si quieres aplicarlo manualmente:
#   kubectl create secret generic tfm-dashboard-secret \
#     --namespace tfm-dashboard \
#     --from-literal=api-key='TU_API_KEY' \
#     --from-literal=aws-access-key-id='TU_ACCESS_KEY' \
#     --from-literal=aws-secret-access-key='TU_SECRET_KEY' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# NOTA: Si usas IRSA (IAM Roles for Service Accounts), NO necesitas
#       aws-access-key-id ni aws-secret-access-key.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: tfm-dashboard-secret
  namespace: tfm-dashboard
type: Opaque
stringData:
  api-key:               "REEMPLAZA_CON_TU_API_KEY"
  aws-access-key-id:     "REEMPLAZA_CON_TU_ACCESS_KEY_ID"
  aws-secret-access-key: "REEMPLAZA_CON_TU_SECRET_ACCESS_KEY"
