# ─── ServiceAccount para IRSA (IAM Roles for Service Accounts) ────────────────
# Permite que el pod API acceda a S3 sin credenciales explícitas.
# Requiere configurar OIDC en el cluster EKS y un IAM Role con la política
# de tfm-lambda-role (ya tiene los permisos S3 necesarios).
#
# 0) Asociar el proveedor OIDC del cluster con IAM (obligatorio para IRSA).
#    Sin esto, AssumeRoleWithWebIdentity falla con InvalidIdentityToken /
#    "No OpenIDConnect provider found ... for https://oidc.eks.../id/...".
#    Tras recrear el cluster, el issuer cambia: vuelva a asociar OIDC y
#    actualice la trust policy del rol IRSA al nuevo issuer.
#   eksctl utils associate-iam-oidc-provider \
#     --cluster TU_CLUSTER --region eu-north-1 --approve
#
# Setup IRSA (una sola vez):
#   eksctl create iamserviceaccount \
#     --name tfm-api-sa \
#     --namespace tfm-dashboard \
#     --cluster TU_CLUSTER \
#     --attach-policy-arn arn:aws:iam::ACCOUNT_ID:policy/tfm-s3-read-policy \
#     --approve \
#     --region eu-north-1
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tfm-api-sa
  namespace: tfm-dashboard
  labels:
    app: tfm-api
  annotations:
    # ARN del IAM Role con permisos S3 — reemplaza con el tuyo
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/tfm-api-irsa-role"
