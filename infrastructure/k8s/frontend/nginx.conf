# ─── nginx.conf — TFM Dashboard Frontend ─────────────────────────────────────
# Rol dual:
#   1. Servir la SPA Angular (con soporte HTML5 routing)
#   2. Hacer proxy inverso de /api/ → pod tfm-api-service:8000
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Compresión gzip para assets Angular
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/x-javascript application/xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Seguridad básica ────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Proxy /api/ → pod API (ClusterIP interno) ───────────────────────
        location /api/ {
            # 'tfm-api-service' es el nombre del Service en K8s
            # K8s DNS lo resuelve dentro del namespace tfm-dashboard
            proxy_pass         http://tfm-api-service:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Assets Angular con caché largo ─────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── SPA: todas las rutas de Angular → index.html ────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── Health check para K8s probes ────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
